<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Informativo 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #FF69B4; /* Rosa Principal */
            --secondary-color: #ffffff;
            --text-color: #333;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Montserrat', sans-serif;
            background-color: var(--secondary-color);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .container {
            text-align: center;
            padding: 20px;
            max-width: 400px;
            width: 90%;
        }

        .icon-box {
            background-color: var(--primary-color);
            width: 80px;
            height: 80px;
            border-radius: 20px;
            margin: 0 auto 25px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 10px 20px rgba(255, 105, 180, 0.3);
        }

        .icon-box svg {
            width: 40px;
            fill: white;
        }

        h1 {
            font-size: 24px;
            color: var(--text-color);
            margin-bottom: 10px;
            font-weight: 700;
        }

        p {
            font-size: 16px;
            color: #666;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        .btn-pressel {
            background-color: var(--primary-color);
            color: white;
            text-decoration: none;
            padding: 20px 40px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 18px;
            display: block;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(255, 105, 180, 0.4);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .footer-text {
            margin-top: 40px;
            font-size: 12px;
            color: #ccc;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Estilo para parecer um App */
        .card {
            background: white;
            padding: 40px 20px;
            border-radius: 30px;
            border: 1px solid #f0f0f0;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="card">
            <div class="icon-box">
                <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
            </div>
            
            <h1>Acesso Liberado</h1>
            <p>Clique no botão abaixo para acessar o portal oficial e verificar suas informações.</p>

            <a href="https://processoaprovados2026.netlify.app" class="btn-pressel">
                CONTINUAR AGORA
            </a>

            <div class="footer-text">
                Conexão Segura e Criptografada
            </div>
        </div>
    </div>

</body>
</html>
